<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1201;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f0f;stop-opacity:1" />
    </linearGradient>

    <!-- Gold glow for Arabic mark -->
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#C8A96E;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#C8A96E;stop-opacity:0" />
    </radialGradient>

    <!-- Subtle geometric clip -->
    <clipPath id="clip">
      <rect width="1200" height="630" />
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- Decorative top-right arc -->
  <circle cx="1100" cy="-80" r="420" fill="none" stroke="#C8A96E" stroke-width="1" stroke-opacity="0.12" clip-path="url(#clip)" />
  <circle cx="1100" cy="-80" r="340" fill="none" stroke="#C8A96E" stroke-width="1" stroke-opacity="0.08" clip-path="url(#clip)" />
  <circle cx="1100" cy="-80" r="260" fill="none" stroke="#C8A96E" stroke-width="1" stroke-opacity="0.06" clip-path="url(#clip)" />

  <!-- Decorative bottom-left arc -->
  <circle cx="100" cy="710" r="380" fill="none" stroke="#C4622D" stroke-width="1" stroke-opacity="0.1" clip-path="url(#clip)" />
  <circle cx="100" cy="710" r="300" fill="none" stroke="#C4622D" stroke-width="1" stroke-opacity="0.07" clip-path="url(#clip)" />

  <!-- Top terracotta bar -->
  <rect x="0" y="0" width="1200" height="4" fill="#C4622D" opacity="0.8" />

  <!-- Gold glow behind Arabic mark -->
  <ellipse cx="200" cy="315" rx="200" ry="200" fill="url(#glow)" />

  <!-- Arabic letter س (large, decorative) -->
  <text x="200" y="390"
    font-family="'Noto Naskh Arabic', 'Arial Unicode MS', serif"
    font-size="240"
    font-weight="700"
    fill="#C8A96E"
    opacity="0.18"
    text-anchor="middle"
    dominant-baseline="auto">س</text>

  <!-- Main content - left aligned -->

  <!-- Small logo pill -->
  <rect x="80" y="80" width="160" height="44" rx="22" fill="#C8A96E" fill-opacity="0.12" stroke="#C8A96E" stroke-width="1" stroke-opacity="0.4" />
  <text x="160" y="108"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="15"
    font-weight="600"
    fill="#C8A96E"
    text-anchor="middle"
    letter-spacing="1">SUNNASTAYS</text>

  <!-- Arabic mark small -->
  <text x="93" y="110"
    font-family="'Noto Naskh Arabic', 'Arial Unicode MS', serif"
    font-size="20"
    font-weight="700"
    fill="#C8A96E"
    opacity="0.6">س</text>

  <!-- Main heading line 1 -->
  <text x="80" y="272"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    fill="#FAF8F4"
    letter-spacing="-2">Halal-certified</text>

  <!-- Main heading line 2 -->
  <text x="80" y="358"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="72"
    font-weight="700"
    fill="#C8A96E"
    letter-spacing="-2">short stays.</text>

  <!-- Divider line -->
  <rect x="80" y="390" width="60" height="3" rx="2" fill="#C4622D" />

  <!-- Tagline -->
  <text x="80" y="440"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="24"
    font-weight="300"
    fill="#FAF8F4"
    opacity="0.7"
    letter-spacing="0.3">For the modern Muslim traveller.</text>

  <!-- Trust badges row -->
  <rect x="80" y="492" width="150" height="38" rx="19" fill="#ffffff" fill-opacity="0.06" stroke="#C8A96E" stroke-width="1" stroke-opacity="0.3" />
  <text x="155" y="516"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="500"
    fill="#C8A96E"
    opacity="0.9"
    text-anchor="middle">✦ Alcohol-free</text>

  <rect x="246" y="492" width="150" height="38" rx="19" fill="#ffffff" fill-opacity="0.06" stroke="#C8A96E" stroke-width="1" stroke-opacity="0.3" />
  <text x="321" y="516"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="500"
    fill="#C8A96E"
    opacity="0.9"
    text-anchor="middle">✦ Halal kitchen</text>

  <rect x="412" y="492" width="160" height="38" rx="19" fill="#ffffff" fill-opacity="0.06" stroke="#C8A96E" stroke-width="1" stroke-opacity="0.3" />
  <text x="492" y="516"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="13"
    font-weight="500"
    fill="#C8A96E"
    opacity="0.9"
    text-anchor="middle">✦ Prayer-friendly</text>

  <!-- Right side: large Arabic س -->
  <text x="980" y="480"
    font-family="'Noto Naskh Arabic', 'Arial Unicode MS', serif"
    font-size="400"
    font-weight="700"
    fill="#C8A96E"
    opacity="0.07"
    text-anchor="middle"
    dominant-baseline="auto">س</text>

  <!-- Right side decorative text -->
  <text x="920" y="300"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="400"
    fill="#C8A96E"
    opacity="0.5"
    text-anchor="middle"
    letter-spacing="3">VERIFIED</text>

  <text x="920" y="330"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="400"
    fill="#C8A96E"
    opacity="0.5"
    text-anchor="middle"
    letter-spacing="3">HALAL</text>

  <text x="920" y="360"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="18"
    font-weight="400"
    fill="#C8A96E"
    opacity="0.5"
    text-anchor="middle"
    letter-spacing="3">STANDARD</text>

  <!-- Vertical line separator -->
  <rect x="840" y="220" width="1" height="220" fill="#C8A96E" opacity="0.15" />

  <!-- Bottom domain -->
  <text x="80" y="590"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="16"
    font-weight="400"
    fill="#FAF8F4"
    opacity="0.35"
    letter-spacing="0.5">sunnastays.com</text>

  <!-- Bottom right green verified dot -->
  <circle cx="960" cy="562" r="7" fill="#22c55e" opacity="0.85" />
  <text x="976" y="568"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="14"
    font-weight="500"
    fill="#FAF8F4"
    opacity="0.5">Halal Guaranteed</text>
</svg>
